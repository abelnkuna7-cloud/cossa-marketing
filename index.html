<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cossa Marketing</title>
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/auth.css">
</head>
<body>
  <div class="auth-container">
    <div class="auth-box">

      <div id="signupSection">
        <h1>Cossa Marketing</h1>
        <p class="subtitle">Growth Operating System for African SMEs</p>
        <form id="signupForm">
          <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" name="email" required>
          </div>
          <div class="form-group">
            <label for="password">Password (min 6 characters)</label>
            <input type="password" id="password" name="password" required minlength="6">
          </div>
          <div class="form-group">
            <label for="businessName">Business Name</label>
            <input type="text" id="businessName" name="businessName" required>
          </div>
          <div class="form-group">
            <label for="businessType">Business Type</label>
            <select id="businessType" name="businessType" required>
              <option value="">-- Select --</option>
              <option value="Construction">Construction</option>
              <option value="Cleaning">Cleaning</option>
              <option value="Dropshipping">Dropshipping</option>
              <option value="Consulting">Consulting</option>
              <option value="Agency">Agency</option>
              <option value="Other">Other</option>
            </select>
          </div>
          <button type="submit" class="btn btn-primary">Create Account</button>
        </form>
        <p class="auth-toggle">Already have an account? <a href="#" onclick="showLogin()">Log in here</a></p>
        <div id="errorMessage" class="error-message"></div>
      </div>

      <div id="loginSection" style="display: none;">
        <h1>Cossa Marketing</h1>
        <p class="subtitle">Log in to your account</p>
        <form id="loginForm">
          <div class="form-group">
            <label for="loginEmail">Email Address</label>
            <input type="email" id="loginEmail" name="email" required>
          </div>
          <div class="form-group">
            <label for="loginPassword">Password</label>
            <input type="password" id="loginPassword" name="password" required>
          </div>
          <button type="submit" class="btn btn-primary">Log In</button>
        </form>
        <p class="auth-toggle">Don't have an account? <a href="#" onclick="showSignup()">Sign up here</a></p>
        <div id="loginErrorMessage" class="error-message"></div>
      </div>

      <div id="verifySection" style="display: none;">
        <h1>Verify Your Email</h1>
        <p style="margin-bottom: 20px; color: #666;">We've sent a verification link to your email. Click the link in the email to continue.</p>
        <button onclick="resendVerification()" class="btn btn-secondary">Resend Verification Email</button>
        <p class="auth-toggle"><a href="#" onclick="showLogin()">Back to login</a></p>
      </div>

    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-analytics-compat.js"></script>

  <script src="js/firebase-config.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
